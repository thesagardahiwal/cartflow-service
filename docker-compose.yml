version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/cartflow
      - JWT_SECRET=super_secret_docker_key
      - JWT_EXPIRES_IN=1h
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - 27017:27017
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: cartflow_redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
